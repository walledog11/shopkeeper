services:
  postgres:
    image: postgres:16
    container_name: clerk-test-postgres
    environment:
      POSTGRES_DB: clerk_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clerk_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - clerk-test-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: clerk-test-redis
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clerk-test-postgres-data:

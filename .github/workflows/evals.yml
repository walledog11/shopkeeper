name: Evals

on:
  pull_request:
    paths:
      - 'apps/dashboard/src/lib/agent/**'
      - 'apps/dashboard/src/lib/messaging/**'
      - '.github/workflows/evals.yml'
  workflow_dispatch:

jobs:
  agent-evals:
    name: Agent Eval Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clerk_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d clerk_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/clerk_test?schema=public
      TEST_REDIS_URL: redis://127.0.0.1:6379/0
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Bootstrap test database
        run: node ./scripts/test-bootstrap.mjs
      - name: Run agent eval suite
        id: evals
        run: |
          set -o pipefail
          npm run test:evals -w apps/dashboard 2>&1 | tee eval-output.log
      - name: Eval summary
        if: always()
        run: |
          {
            echo "## Agent eval results"
            echo ""
            if [ "${{ steps.evals.outcome }}" = "success" ]; then
              echo "Suite passed."
            else
              echo "Suite failed. Per-fixture log lines:"
            fi
            echo ""
            echo '```'
            grep -E '^\[eval(:cache)?\]' eval-output.log || echo "(no per-fixture lines captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

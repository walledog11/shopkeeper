name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unit:
    name: Unit Tests
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit
      - name: Run node script tests
        run: npm run test:node

  lint:
    name: Lint and Audit
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run critical severity audit
        run: npm audit --audit-level=critical
      - name: Run lint
        run: npm run lint
      - name: Run type checks
        run: npm run typecheck

  integration:
    name: Integration Tests and Coverage
    needs: [secret-scan, lint, unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Start test services
        run: npm run test:services:up
      - name: Run integration tests with coverage
        run: npm run test:coverage
      - name: Upload coverage reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: |
            apps/dashboard/coverage/
            apps/gateway/coverage/
            packages/agent/coverage/
            packages/email/coverage/
          retention-days: 7
      - name: Stop test services
        if: ${{ always() }}
        run: npm run test:services:down

  build:
    name: Build
    needs: [secret-scan, lint, unit]
    runs-on: ubuntu-latest
    env:
      APP_URL: https://app.example.com
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: test-clerk-publishable-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run production build
        run: npm run build

  e2e:
    name: E2E Tests
    needs: [secret-scan, lint, unit, integration, build]
    runs-on: ubuntu-latest
    env:
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || vars.CLERK_SECRET_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY || vars.CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY || vars.CLERK_PUBLISHABLE_KEY }}
      CLERK_E2E_EMAIL: ${{ secrets.CLERK_E2E_EMAIL || vars.CLERK_E2E_EMAIL }}
      E2E_CLERK_ORG_ID: ${{ secrets.E2E_CLERK_ORG_ID || vars.E2E_CLERK_ORG_ID }}
      ANTHROPIC_API_KEY: test-anthropic-key
      INTERNAL_API_SECRET: test-internal-secret
      INTERNAL_API_SECRET_PREV: test-internal-secret-prev
      INSTAGRAM_APP_ID: test-instagram-app-id
      INSTAGRAM_APP_SECRET: test-instagram-secret
      INSTAGRAM_INTEGRATION_ENABLED: "true"
      INSTAGRAM_WEBHOOK_APP_SECRET: test-instagram-webhook-secret
      INSTAGRAM_WEBHOOK_VERIFY_TOKEN: test-instagram-verify-token
      META_APP_ID: test-meta-app-id
      META_APP_SECRET: test-meta-secret
      META_VERIFY_TOKEN: test-verify-token
      POSTMARK_API_KEY: test-postmark-key
      SHOPIFY_APP_SECRET: test-shopify-secret
      STRIPE_SECRET_KEY: test-stripe-key
      STRIPE_WEBHOOK_SECRET: test-stripe-webhook-secret
      TWILIO_ACCOUNT_SID: ACtest
      TWILIO_AUTH_TOKEN: test-twilio-token
      TWILIO_FROM_NUMBER: "+15555550123"
      TWILIO_WHATSAPP_NUMBER: "whatsapp:+15555550123"
      TWILIO_WEBHOOK_URL: http://127.0.0.1:8180/webhooks/twilio
      UPSTASH_REDIS_REST_URL: https://example-upstash.local
      UPSTASH_REDIS_REST_TOKEN: test-upstash-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Start test services
        run: npm run test:services:up
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run smoke E2E tests
        run: npm run test:e2e:smoke
      - name: Upload Playwright artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 7
      - name: Stop test services
        if: ${{ always() }}
        run: npm run test:services:down

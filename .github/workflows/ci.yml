name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unit:
    name: Unit Tests
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit

  lint:
    name: Lint
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint

  integration:
    name: Integration Tests
    needs: secret-scan
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clerk_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d clerk_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/clerk_test?schema=public
      TEST_REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run integration tests
        run: npm run test:integration

  e2e:
    name: E2E Tests
    needs: [secret-scan, lint, unit, integration]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clerk_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d clerk_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/clerk_test?schema=public
      TEST_REDIS_URL: redis://127.0.0.1:6379/0
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || vars.CLERK_SECRET_KEY }}
      CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY || vars.CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.CLERK_PUBLISHABLE_KEY || vars.CLERK_PUBLISHABLE_KEY }}
      CLERK_E2E_EMAIL: ${{ secrets.CLERK_E2E_EMAIL || vars.CLERK_E2E_EMAIL }}
      E2E_CLERK_ORG_ID: ${{ secrets.E2E_CLERK_ORG_ID || vars.E2E_CLERK_ORG_ID }}
      ANTHROPIC_API_KEY: test-anthropic-key
      INTERNAL_API_SECRET: test-internal-secret
      INTERNAL_API_SECRET_PREV: test-internal-secret-prev
      META_APP_ID: test-meta-app-id
      META_APP_SECRET: test-meta-secret
      META_VERIFY_TOKEN: test-verify-token
      POSTMARK_API_KEY: test-postmark-key
      SHOPIFY_APP_SECRET: test-shopify-secret
      STRIPE_SECRET_KEY: test-stripe-key
      STRIPE_WEBHOOK_SECRET: test-stripe-webhook-secret
      TWILIO_ACCOUNT_SID: ACtest
      TWILIO_AUTH_TOKEN: test-twilio-token
      TWILIO_FROM_NUMBER: "+15555550123"
      TWILIO_WHATSAPP_NUMBER: "whatsapp:+15555550123"
      TWILIO_WEBHOOK_URL: http://127.0.0.1:8180/webhooks/twilio
      UPSTASH_REDIS_REST_URL: https://example-upstash.local
      UPSTASH_REDIS_REST_TOKEN: test-upstash-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E smoke tests
        run: npm run test:e2e:smoke

      - name: Run E2E browser tests (when Clerk env is available)
        shell: bash
        run: |
          missing=()

          if [[ -z "${CLERK_E2E_EMAIL:-}" ]]; then
            missing+=("CLERK_E2E_EMAIL")
          fi

          if [[ -z "${E2E_CLERK_ORG_ID:-}" ]]; then
            missing+=("E2E_CLERK_ORG_ID")
          fi

          if [[ -z "${CLERK_SECRET_KEY:-}" ]]; then
            missing+=("CLERK_SECRET_KEY")
          fi

          if [[ -z "${CLERK_PUBLISHABLE_KEY:-}" && -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ]]; then
            missing+=("CLERK_PUBLISHABLE_KEY or NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY")
          fi

          if [[ ${#missing[@]} -gt 0 ]]; then
            missing_joined="$(IFS=', '; echo "${missing[*]}")"
            echo "Skipping browser E2E tests because required Clerk secrets are missing."
            echo "Missing: $missing_joined"
            echo "Required: CLERK_E2E_EMAIL, E2E_CLERK_ORG_ID, CLERK_SECRET_KEY, and CLERK_PUBLISHABLE_KEY or NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY."
            exit 0
          fi

          npm run test:e2e:browser
      - name: Upload Playwright artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 7
